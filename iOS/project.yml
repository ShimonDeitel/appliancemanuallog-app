name: ApplianceManualLog
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
settings:
  MARKETING_VERSION: "1.0"
  CURRENT_PROJECT_VERSION: "1"
  DEVELOPMENT_TEAM: W7Q885Q59C
targets:
  ApplianceManualLog:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ApplianceManualLog/Sources
      - path: ApplianceManualLog/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.manuallog
        DEVELOPMENT_TEAM: W7Q885Q59C
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Appliance Manual Log"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
    info:
      path: ApplianceManualLog/Info.plist
      properties:
        UILaunchScreen: {}
        NSFaceIDUsageDescription: "Used to lock sensitive entries."
  ApplianceManualLogTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ApplianceManualLog/Tests
    dependencies:
      - target: ApplianceManualLog
    settings:
      base:
        DEVELOPMENT_TEAM: W7Q885Q59C
  ApplianceManualLogUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ApplianceManualLog/UITests
    dependencies:
      - target: ApplianceManualLog
    settings:
      base:
        DEVELOPMENT_TEAM: W7Q885Q59C
schemes:
  ApplianceManualLog:
    build:
      targets:
        ApplianceManualLog: all
    test:
      targets:
        - ApplianceManualLogTests
        - ApplianceManualLogUITests
    run:
      config: Debug
